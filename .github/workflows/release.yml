# Signed release build. Every run produces a fully Developer ID-signed,
# notarized, stapled app — these are production drops, never unsigned. A `v*`
# tag additionally publishes the artifact to a GitHub release. workflow_dispatch
# runs the same signed pipeline (for testing) but publishes nothing.
#
# Required repository/organization secrets:
#   DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64   base64 of the .p12
#   DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD .p12 export password
#   APPLE_ID                                      Apple ID for notarytool
#   APPLE_APP_SPECIFIC_PASSWORD                   app-specific password
# Never commit credentials.
name: Release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build ReportGitHub
    runs-on: macos-26
    env:
      APPLE_TEAM_ID: EZCN55TA7J

    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show build environment
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Test
        run: swift test

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD" \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          echo "SIGNING_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build signed app
        env:
          SIGN_IDENTITY: "Developer ID Application"
          DEVELOPMENT_TEAM: ${{ env.APPLE_TEAM_ID }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            export VERSION="${GITHUB_REF_NAME#v}"
          fi
          ./Scripts/make_app.sh release

      - name: Verify signed app
        run: |
          codesign --verify --deep --strict --verbose=4 dist/ReportGitHub.app
          codesign -dvvv dist/ReportGitHub.app

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          ditto -c -k --keepParent dist/ReportGitHub.app "$RUNNER_TEMP/ReportGitHub-notary.zip"
          SUBMIT_JSON=$(xcrun notarytool submit "$RUNNER_TEMP/ReportGitHub-notary.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json --wait)
          echo "$SUBMIT_JSON"
          SUB_ID=$(echo "$SUBMIT_JSON" | python3 -c "import sys,json;print(json.load(sys.stdin)['id'])")
          STATUS=$(echo "$SUBMIT_JSON" | python3 -c "import sys,json;print(json.load(sys.stdin)['status'])")
          echo "Notarization status: $STATUS (submission $SUB_ID)"
          # Always surface the detailed log — it pinpoints any rejected binary.
          xcrun notarytool log "$SUB_ID" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" || true
          if [[ "$STATUS" != "Accepted" ]]; then
            echo "Notarization did not succeed (status: $STATUS)" >&2
            exit 1
          fi
          xcrun stapler staple dist/ReportGitHub.app
          xcrun stapler validate dist/ReportGitHub.app
          codesign --verify --deep --strict --verbose=4 dist/ReportGitHub.app
          spctl -a -vvv -t exec dist/ReportGitHub.app

      - name: Package
        run: ditto -c -k --keepParent dist/ReportGitHub.app dist/ReportGitHub.zip

      - name: Verify packaged app
        run: |
          security delete-keychain "$SIGNING_KEYCHAIN_PATH"
          security list-keychains -d user -s "$HOME/Library/Keychains/login.keychain-db"
          VERIFY_DIR="$RUNNER_TEMP/reportgithub-release-verify"
          mkdir -p "$VERIFY_DIR"
          ditto -x -k dist/ReportGitHub.zip "$VERIFY_DIR"
          codesign --verify --deep --strict --verbose=4 "$VERIFY_DIR/ReportGitHub.app"
          codesign -dvvv "$VERIFY_DIR/ReportGitHub.app"
          xcrun stapler validate "$VERIFY_DIR/ReportGitHub.app"
          spctl -a -vvv -t exec "$VERIFY_DIR/ReportGitHub.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ReportGitHub
          path: dist/ReportGitHub.zip

      - name: Publish GitHub release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/ReportGitHub.zip --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/ReportGitHub.zip \
              --repo "$GITHUB_REPOSITORY" \
              --title "ReportGitHub $GITHUB_REF_NAME" \
              --generate-notes
          fi
